name: Sync 1 Source with Random Flags & Numbering

on:
  schedule:
    - cron: "0 * * * *" 
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and Decode
        run: |
          SOURCE_URL="https://vpn.tgflovv.ru:8443/free-speed/3e6ec68a-567b-47cf-95e9-d0e925a935b5"
          FLAGS=("🇸🇴" "🇸🇴" "🇸🇴" "🇺🇸" "🇩🇪" "🇫🇮" "🇵🇱" "🇳🇱" "🇬🇧" "🇫🇷" "🇰🇿" "🇹🇷" "🇸🇪" "🇦🇹" "🇨🇿")

          touch README.md
          # 1. Сохраняем свои ключи
          grep "://" README.md | grep -v "Обход Блокировок" > my_own_keys.txt || touch my_own_keys.txt
          
          # 2. Качаем ту самую "кашу" со скрина
          curl -L -k -s "$SOURCE_URL" -o raw.txt
          
          # 3. Декодируем (чистим от пробелов и переносов)
          cat raw.txt | tr -d '[:space:]' > clean_base64.txt
          base64 -d clean_base64.txt > decoded.txt 2>/dev/null || cp raw.txt decoded.txt

          # 4. Собираем только ссылки
          > alive_keys.txt
          COUNT=1
          while IFS= read -r line; do
            CLEAN_URL=$(echo "$line" | grep -oE "(vless|vmess|trojan|ss)://[^# ]+")
            if [ ! -z "$CLEAN_URL" ]; then
                RANDOM_FLAG=${FLAGS[$RANDOM % ${#FLAGS[@]}]}
                echo "${CLEAN_URL}#${RANDOM_FLAG} Обход Блокировок 🔗 $COUNT" >> alive_keys.txt
                COUNT=$((COUNT + 1))
            fi
          done < decoded.txt

          # 5. Сборка финального README
          echo "#subscription-userinfo: upload=0; download=0; total=1125899906842624; expire=3803572800" > README.md
          echo "#profile-title: Обход Блокировок" >> README.md
          echo "#profile-update-interval: 1" >> README.md
          echo "#announce:Если VPN не работает нажмите 🔄 , после ⏱️ и выберите сервер с наименьшим показателем ms!" >> README.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> README.md
          echo "" >> README.md
          
          cat my_own_keys.txt >> README.md
          cat alive_keys.txt >> README.md

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "Update $(date +'%H:%M')" || exit 0
          git push origin HEAD --force
          
