name: Multi-Source Sync & Health Check

on:
  schedule:
    - cron: "0 */3 * * *" # Проверка раз в час (чаще не стоит, чтобы GitHub не забанил за нагрузку)
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Checker
        run: |
          # Устанавливаем инструмент для проверки ключей
          curl -L https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip -o v2ray.zip
          unzip v2ray.zip && chmod +x v2ray

      - name: Fetch and Check Keys
        run: |
          # 1. Ссылки на источники
          SOURCES=(
            "https://vpn.tgflovv.ru:8443/sub/a231c089-9065-4525-a226-bb4f4fd487d2"
            "https://vpn.tgflovv.ru:8443/free-white-ru/46c6baae-ed09-4000-bb69-f63f1c100fbf"
            "https://vpn.tgflovv.ru:8443/free-white/46c6baae-ed09-4000-bb69-f63f1c100fbf"
          )

          # 2. Собираем всё в один файл
          > all_raw.txt
          for url in "${SOURCES[@]}"; do
            curl -L -s "$url" -o temp.txt
            if ! grep -q "://" temp.txt; then
              base64 -d temp.txt >> all_raw.txt 2>/dev/null || cat temp.txt >> all_raw.txt
            else
              cat temp.txt >> all_raw.txt
            fi
          done

          # 3. Сохраняем твои текущие ключи (их проверять не будем, они всегда в приоритете)
          touch README.md
          grep "://" README.md | grep -v "🇵🇰 Антизаглушка" > my_own_keys.txt || touch my_own_keys.txt
          
          # 4. Простая проверка доступности порта (TCP Check)
          # Это отсеет 90% мертвых серверов
          > alive_keys.txt
          while IFS= read -r line; do
            if [[ $line =~ ^(vless|vmess|trojan|ss):// ]]; then
              # Извлекаем адрес сервера и порт
              HOST=$(echo "$line" | sed -e 's/.*@//' -e 's/:.*//' -e 's/\/.*//')
              PORT=$(echo "$line" | sed -e 's/.*://' -e 's/[?#\/].*//')
              
              # Пингуем порт сервера (таймаут 2 секунды)
              if timeout 2s bash -c "true &>/dev/null > /dev/tcp/$HOST/$PORT" 2>/dev/null; then
                CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
                echo "${CLEAN_URL}#🇵🇰 Антизаглушка" >> alive_keys.txt
              fi
            fi
          done < all_raw.txt

          # 5. Сборка файла (Сохраняем твои заголовки и твои ключи)
          # Берем первые 5 строк (заголовки) из старого файла
          head -n 5 README.md | grep "#" > new_readme.md
          echo "" >> new_readme.md
          
          # Добавляем твои личные ключи
          cat my_own_keys.txt >> new_readme.md
          
          # Добавляем только ЖИВЫЕ ключи из панелей
          cat alive_keys.txt | sort -u >> new_readme.md
          
          mv new_readme.md README.md

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Auto-check: removed dead keys" || exit 0
          git push origin main --force
          
