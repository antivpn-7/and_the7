name: Sync 1 Source with Random Flags & Numbering

on:
  schedule:
    - cron: "0 * * * *" 
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch, Check and Style Keys
        run: |
          # 1. Твой источник
          SOURCE_URL="https://vpn.tgflovv.ru:8443/free-speed/3e6ec68a-567b-47cf-95e9-d0e925a935b5"
          FLAGS=("🇸🇴" "🇸🇴" "🇸🇴" "🇺🇸" "🇩🇪" "🇫🇮" "🇵🇱" "🇳🇱" "🇬🇧" "🇫🇷" "🇰🇿" "🇹🇷" "🇸🇪" "🇦🇹" "🇨🇿")

          touch README.md
          # Сохраняем личные ключи
          grep "://" README.md | grep -v "Обход Блокировок" > my_own_keys.txt || touch my_own_keys.txt
          cut -d'#' -f1 my_own_keys.txt > existing_urls.txt || touch existing_urls.txt

          # Качаем источник с игнором ошибок SSL (-k)
          curl -L -s -k "$SOURCE_URL" -o raw_source.txt
          
          if ! grep -q "://" raw_source.txt; then
            base64 -d raw_source.txt > decoded_keys.txt 2>/dev/null || cp raw_source.txt decoded_keys.txt
          else
            cp raw_source.txt decoded_keys.txt
          fi

          > alive_keys.txt
          COUNT=1
          while IFS= read -r line; do
            line=$(echo "$line" | tr -d '\r' | xargs)
            if [[ $line =~ ^(vless|vmess|trojan|ss):// ]]; then
              CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
              if ! grep -Fxq "$CLEAN_URL" existing_urls.txt; then
                  RANDOM_FLAG=${FLAGS[$RANDOM % ${#FLAGS[@]}]}
                  echo "${CLEAN_URL}#${RANDOM_FLAG} Обход Блокировок 🔗 $COUNT" >> alive_keys.txt
                  COUNT=$((COUNT + 1))
              fi
            fi
          done < decoded_keys.txt

          # Сборка
          TRAFFIC_LINE=$(grep "#subscription-userinfo" README.md || echo "#subscription-userinfo: upload=0; download=0; total=1125899906842624; expire=3803572800")
          
          echo "$TRAFFIC_LINE" > new_readme.md
          echo "#profile-title: Обход Блокировок" >> new_readme.md
          echo "#profile-update-interval: 1" >> new_readme.md
          echo "#announce:Если VPN не работает нажмите 🔄 , после ⏱️ и выберите сервер с наименьшим показателем ms!" >> new_readme.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> new_readme.md
          echo "" >> new_readme.md
          
          cat my_own_keys.txt >> new_readme.md
          cat alive_keys.txt >> new_readme.md
          mv new_readme.md README.md

      - name: Force Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          # Проверяем изменения
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update: Обход Блокировок $(date +'%Y-%m-%d %H:%M')"
            # Пушим в ту ветку, которая сейчас активна
            git push origin HEAD --force
          fi
          
