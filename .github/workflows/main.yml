name: Multi-Source Sync & Health Check

on:
  schedule:
    - cron: "0 */1 * * *" 
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and Check Keys
        run: |
          # 1. Список источников
          SOURCES=(
            "https://vpn.tgflovv.ru:8443/sub/a231c089-9065-4525-a226-bb4f4fd487d2"
            "https://vpn.tgflovv.ru:8443/free-white-ru/46c6baae-ed09-4000-bb69-f63f1c100fbf"
            "https://vpn.tgflovv.ru:8443/free-white/46c6baae-ed09-4000-bb69-f63f1c100fbf"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-SNI-RU-all.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          )

          # 2. Сохраняем твои личные ключи
          touch README.md
          grep "://" README.md | grep -v "АНТИЗАГЛУШКА" > my_own_keys.txt || touch my_own_keys.txt
          
          # Собираем существующие URL для проверки на дубли
          cut -d'#' -f1 my_own_keys.txt > existing_urls.txt

          # 3. Качаем и проверяем новые ключи
          > alive_keys.txt
          for url in "${SOURCES[@]}"; do
            curl -L -s "$url" -o temp.txt
            if ! grep -q "://" temp.txt; then
              base64 -d temp.txt > raw_temp.txt 2>/dev/null || cp temp.txt raw_temp.txt
            else
              cp temp.txt raw_temp.txt
            fi

            while IFS= read -r line; do
              if [[ $line =~ ^(vless|vmess|trojan|ss):// ]]; then
                CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
                HOST=$(echo "$CLEAN_URL" | sed -e 's/.*@//' -e 's/:.*//' -e 's/\/.*//')
                PORT=$(echo "$CLEAN_URL" | sed -e 's/.*://' -e 's/[?#\/].*//')
                
                if ! grep -q "$CLEAN_URL" existing_urls.txt; then
                  if timeout 1s bash -c "true &>/dev/null > /dev/tcp/$HOST/$PORT" 2>/dev/null; then
                    # Ставим твое название на каждый новый ключ
                    echo "${CLEAN_URL}#АНТИЗАГЛУШКА 🐺" >> alive_keys.txt
                    echo "$CLEAN_URL" >> existing_urls.txt
                  fi
                fi
              fi
            done < raw_temp.txt
          done

          # 4. Сборка итогового файла
          TRAFFIC_LINE=$(grep "#subscription-userinfo" README.md || echo "#subscription-userinfo: upload=0; download=0; total=1125899906842624; expire=3803572800")
          
          echo "$TRAFFIC_LINE" > new_readme.md
          echo "#profile-title: АНТИЗАГЛУШКА 🐺" >> new_readme.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> new_readme.md
          echo "" >> new_readme.md
          
          # Твои личные сервера сверху
          cat my_own_keys.txt >> new_readme.md
          
          # Остальные рабочие сервера снизу
          cat alive_keys.txt >> new_readme.md
          
          mv new_readme.md README.md

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Update title to АНТИЗАГЛУШКА 🐺" || exit 0
          git push origin main --force
          
