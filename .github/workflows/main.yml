name: Multi-Source Sync Keys

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and Append Keys
        run: |
          # --- СПИСОК ТВОИХ ССЫЛОК ---
          SOURCES=(
            "https://vpn.tgflovv.ru:8443/sub/a231c089-9065-4525-a226-bb4f4fd487d2"
            "https://vpn.tgflovv.ru:8443/free-white-ru/46c6baae-ed09-4000-bb69-f63f1c100fbf"
            "https://vpn.tgflovv.ru:8443/free-white/46c6baae-ed09-4000-bb69-f63f1c100fbf"
          )
          # ---------------------------

          # 1. Сначала сохраняем твой текущий README (со всеми твоими настройками)
          touch README.md
          
          # 2. Собираем только URL-адреса ключей, которые уже есть в файле (для проверки на дубли)
          grep "://" README.md | cut -d'#' -f1 > existing_urls.txt || touch existing_urls.txt

          # 3. Собираем новые ключи из всех источников
          > all_raw_new.txt
          for url in "${SOURCES[@]}"; do
            echo "Fetching from $url..."
            curl -L -s "$url" -o temp_sub.txt
            if ! grep -q "://" temp_sub.txt; then
              base64 -d temp_sub.txt >> all_raw_new.txt 2>/dev/null || cat temp_sub.txt >> all_raw_new.txt
            else
              cat temp_sub.txt >> all_raw_new.txt
            fi
          done

          # 4. Фильтруем: берем только уникальные ключи, которых У ТЕБЯ ЕЩЕ НЕТ
          > to_append.txt
          while IFS= read -r line; do
            if [[ $line =~ ^(vless|vmess|trojan|ss|hysteria2|tuic):// ]]; then
              CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
              # Если этого URL нет в нашем списке существующих — добавляем
              if ! grep -q "$CLEAN_URL" existing_urls.txt; then
                echo "${CLEAN_URL}#🇵🇰 Антизаглушка" >> to_append.txt
                # Сразу помечаем как "уже добавленный", чтобы не было дублей внутри одного прохода
                echo "$CLEAN_URL" >> existing_urls.txt
              fi
            fi
          done < all_raw_new.txt

          # 5. Просто дописываем новые ключи в самый низ твоего файла
          # Твой трафик, название и личные ключи остаются сверху нетронутыми
          cat to_append.txt >> README.md

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Sync keys from 3 sources to bottom" || exit 0
          git push origin main --force
          
