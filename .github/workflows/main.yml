name: Sync 1 Source with Random Flags & Numbering

on:
  schedule:
    - cron: "0 */1 * * *" 
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch, Check and Style Keys
        run: |
          # 1. –Ґ–≤–Њ–Є –Є—Б—В–Њ—З–љ–Є–Ї–Є
          SOURCES=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
          )

          # –°–њ–Є—Б–Њ–Ї —Д–ї–∞–≥–∞ –і–ї—П —А–∞–Ј–љ–Њ–Њ–±—А–∞–Ј–Є—П
          FLAGS=("рЯЗЇрЯЗЄ" "рЯЗ©рЯЗ™" "рЯЗЂрЯЗЃ" "рЯЗµрЯЗ±" "рЯЗ≥рЯЗ±" "рЯЗђрЯЗІ" "рЯЗЂрЯЗЈ" "рЯЗ∞рЯЗњ" "рЯЗєрЯЗЈ" "рЯЗЄрЯЗ™" "рЯЗ¶рЯЗє" "рЯЗ®рЯЗњ")

          # 2. –°–Њ—Е—А–∞–љ—П–µ–Љ —В–≤–Њ–Є –ї–Є—З–љ—Л–µ –Ї–ї—О—З–Є (—В–µ, –≥–і–µ –љ–µ—В —А–∞–Ї–µ—В—Л рЯЪА)
          touch README.md
          grep "://" README.md | grep -v "рЯЪА" > my_own_keys.txt || touch my_own_keys.txt
          
          # –°–Њ–±–Є—А–∞–µ–Љ —Б—Г—Й–µ—Б—В–≤—Г—О—Й–Є–µ URL –і–ї—П –њ—А–Њ–≤–µ—А–Ї–Є –љ–∞ –і—Г–±–ї–Є
          cut -d'#' -f1 my_own_keys.txt > existing_urls.txt

          # 3. –Ъ–∞—З–∞–µ–Љ –Є –њ—А–Њ–≤–µ—А—П–µ–Љ –љ–Њ–≤—Л–µ –Ї–ї—О—З–Є
          > alive_keys.txt
          COUNT=1
          
          for url in "${SOURCES[@]}"; do
            curl -L -s "$url" -o temp.txt
            if ! grep -q "://" temp.txt; then
              base64 -d temp.txt > raw_temp.txt 2>/dev/null || cp temp.txt raw_temp.txt
            else
              cp temp.txt raw_temp.txt
            fi

            while IFS= read -r line; do
              if [[ $line =~ ^(vless|vmess|trojan|ss):// ]]; then
                CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
                HOST=$(echo "$CLEAN_URL" | sed -e 's/.*@//' -e 's/:.*//' -e 's/\/.*//')
                PORT=$(echo "$CLEAN_URL" | sed -e 's/.*://' -e 's/[?#\/].*//')
                
                if ! grep -q "$CLEAN_URL" existing_urls.txt; then
                  if timeout 1s bash -c "true &>/dev/null > /dev/tcp/$HOST/$PORT" 2>/dev/null; then
                    RANDOM_FLAG=${FLAGS[$RANDOM % ${#FLAGS[@]}]}
                    echo "${CLEAN_URL}#${RANDOM_FLAG} Antizaglushka рЯЪА вДЦ$COUNT" >> alive_keys.txt
                    echo "$CLEAN_URL" >> existing_urls.txt
                    COUNT=$((COUNT + 1))
                  fi
                fi
              fi
            done < raw_temp.txt
          done

          # 4. –°–±–Њ—А–Ї–∞ –Є—В–Њ–≥–Њ–≤–Њ–≥–Њ —Д–∞–є–ї–∞
          TRAFFIC_LINE=$(grep "#subscription-userinfo" README.md || echo "#subscription-userinfo: upload=0; download=0; total=1125899906842624; expire=3803572800")
          
          echo "$TRAFFIC_LINE" > new_readme.md
          echo "#profile-title: the energy vpn" >> new_readme.md
          echo "#announce:–Х—Б–ї–Є VPN –љ–µ —А–∞–±–Њ—В–∞–µ—В –љ–∞–ґ–Љ–Є—В–µ рЯФД , –њ–Њ—Б–ї–µ вП±пЄП –Є –≤—Л–±–µ—А–Є—В–µ —Б–µ—А–≤–µ—А —Б –љ–∞–Є–Љ–µ–љ—М—И–Є–Љ –њ–Њ–Ї–∞–Ј–∞—В–µ–ї–µ–Љ ms!" >> new_readme.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> new_readme.md
          echo "" >> new_readme.md
          
          # –Ґ–≤–Њ–Є –ї–Є—З–љ—Л–µ —Б–µ—А–≤–µ—А–∞ (–Ю—Б–љ–Њ–≤–љ–Њ–є –Є —В.–і.) —Б—В–Њ—П—В –њ–µ—А–≤—Л–Љ–Є
          cat my_own_keys.txt >> new_readme.md
          
          # –Э–Њ–≤—Л–µ —Б–µ—А–≤–µ—А–∞
          cat alive_keys.txt >> new_readme.md
          
          mv new_readme.md README.md

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Update: single source speed, random flags and numbering" || exit 0
          git push origin main --force
          
