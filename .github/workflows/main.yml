name: Simple Sync Keys

on:
  schedule:
    - cron: "*/15 * * * *" # Проверка каждые 15 минут
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and Append
        run: |
          # 1. Скачиваем ключи из чужого источника
          curl -L -s "https://vpn.tgflovv.ru:8443/sub/a231c089-9065-4525-a226-bb4f4fd487d2" -o incoming.txt
          
          # Декодируем, если это Base64
          if ! grep -q "://" incoming.txt; then
            base64 -d incoming.txt > raw_new.txt 2>/dev/null || cp incoming.txt raw_new.txt
          else
            cp incoming.txt raw_new.txt
          fi

          # 2. Сохраняем всё, что сейчас есть в твоем README.md (твои личные ключи)
          touch README.md
          grep "://" README.md > current_keys.txt || touch current_keys.txt

          # 3. Фильтруем новые ключи, чтобы не было дублей и мусора
          > to_add.txt
          while IFS= read -r line; do
            if [[ $line =~ ^(vless|vmess|trojan|ss|hysteria2|tuic):// ]]; then
              # Чистим ссылку от старого названия
              CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
              
              # Проверяем, нет ли такого ключа уже в твоем списке
              if ! grep -q "$CLEAN_URL" current_keys.txt; then
                echo "${CLEAN_URL}#🇵🇰 Антизаглушка" >> to_add.txt
              fi
            fi
          done < raw_new.txt

          # 4. Пересобираем README.md
          # Оставляем только технический заголовок в самом верху
          echo "#profile-title: ADAM_VPN | АНТИЗАГЛУШКА" > README.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> README.md
          echo "" >> README.md
          
          # Сначала твои ключи (которые были в файле)
          cat current_keys.txt >> README.md
          
          # В самый низ — новые ключи из панели
          cat to_add.txt >> README.md

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Just sync keys to bottom" || exit 0
          git push origin main --force
          
