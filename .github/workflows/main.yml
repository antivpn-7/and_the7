      - name: Fetch and Clean for v2rayNG
        run: |
          SOURCE_URL="https://sub.cdnjst.org/sub/d90b4d13-1f4c-443e-9b84-02b6c95b74c1"
          
          # 1. Качаем и расшифровываем исходник
          curl -L -s -A "v2rayNG/1.8.5" "$SOURCE_URL" -o encrypted.txt
          sed -i 's/[[:space:]]//g' encrypted.txt
          base64 -d encrypted.txt > raw_keys.txt 2>/dev/null || cp encrypted.txt raw_keys.txt

          # 2. Создаем файл ТОЛЬКО с ключами (без лишнего текста)
          # v2rayNG лучше всего работает, когда видит чистый список ссылок
          > list.txt
          
          COUNT=1
          while IFS= read -r line; do
            line=$(echo "$line" | tr -d '\r' | xargs)
            if [[ $line =~ ^(vless|vmess|trojan|ss):// ]]; then
              # Вырезаем старое название и ставим свое
              CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
              
              # Получаем название страны из оригинала, если оно там есть
              NAME=$(echo "$line" | cut -d'#' -f2)
              
              # Если в оригинале нет имени, пишем свое
              if [ -z "$NAME" ]; then NAME="Server $COUNT"; fi
              
              echo "${CLEAN_URL}#ADAM VPN | $NAME" >> list.txt
              COUNT=$((COUNT + 1))
            fi
          done < raw_keys.txt

          # 3. Кодируем в Base64 без переносов строк (важно для v2rayNG)
          cat list.txt | base64 -w 0 > README.md
          
