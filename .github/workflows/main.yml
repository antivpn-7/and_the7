name: ADAM VPN Encrypt Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch, Mask and Encrypt
        run: |
          # 1. Твой источник
          SOURCE_URL="https://sub.cdnjst.org/sub/d90b4d13-1f4c-443e-9b84-02b6c95b74c1"
          
          # 2. Качаем ключи (с маскировкой под приложение)
          curl -L -s -A "v2rayNG/1.8.5" "$SOURCE_URL" -o raw_source.txt
          
          # Декодируем входящий поток, если он зашифрован
          sed -i 's/[[:space:]]//g' raw_source.txt
          base64 -d raw_source.txt > decoded.txt 2>/dev/null || cp raw_source.txt decoded.txt

          # 3. Создаем структуру подписки (текстовый вариант)
          echo "#profile-title: base64:QURBTSBWUE4g8J+agA==" > list.txt
          echo "#announce: base64:8J+RowCheckIDog0JXRgdC70Lgg0L3QtSBy0LDQsdC+0YLQsNC10YIg4oCUINC+0LHQvdC+0LLQuNGC0LUg0L_QvtC00L_QuNGB0LrRgyE=" >> list.txt
          echo "#support-url: https://t.me/ElbrusWayBot" >> list.txt
          echo "#profile-update-interval: 1" >> list.txt
          echo "" >> list.txt

          # 4. Добавляем ключи с твоими названиями
          COUNT=1
          while IFS= read -r line; do
            line=$(echo "$line" | tr -d '\r' | xargs)
            if [[ $line =~ ^(vless|vmess|trojan|ss):// ]]; then
              CLEAN_URL=$(echo "$line" | cut -d'#' -f1)
              # Формат: Ключ#Название
              echo "${CLEAN_URL}#ADAM VPN 🚀 Server $COUNT" >> list.txt
              COUNT=$((COUNT + 1))
            fi
          done < decoded.txt

          # 5. ГЛАВНЫЙ ШАГ: Шифруем весь файл README.md в Base64
          base64 -w 0 list.txt > README.md

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Update: Encrypted ADAM VPN subscription" || exit 0
          git push origin main --force
          
